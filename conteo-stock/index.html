<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Conteo de Stock — Central Recoleta 4</title>
<style>
:root{--bg:#1e1e2e;--surface:#2a2a3e;--border:#444;--accent:#4f46e5;--accent2:#0ea5e9;--green:#4ade80;--red:#f87171;--text:#f0f0f0;--muted:#888}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100vh}
.screen{display:none;padding:16px;max-width:480px;margin:0 auto}
.screen.active{display:block}
h1{font-size:20px;font-weight:800;letter-spacing:1px;text-align:center}
.subtitle{font-size:12px;color:var(--muted);text-align:center;margin-top:2px}
.label{font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:4px}
.card{background:var(--surface);border-radius:12px;padding:14px;margin-bottom:12px}
input[type=text],input[type=time],input[type=date]{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:14px;outline:none}
input:focus{border-color:var(--accent)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.turno-toggle{display:flex;gap:6px}
.turno-btn{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px;text-align:center;font-size:14px;font-weight:700;color:var(--muted);cursor:pointer}
.turno-btn.active{background:var(--accent);border-color:var(--accent);color:white}
.btn{width:100%;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:10px}
.btn-primary{background:var(--accent);color:white}
.btn-info{background:var(--accent2);color:white}
.btn-disabled{background:#333;color:#555;cursor:not-allowed}
.btn-success{background:#16a34a;color:white}
.cat-list{display:flex;flex-direction:column;gap:8px}
.cat-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--bg);border-radius:8px;cursor:pointer;border:1px solid var(--border)}
.cat-item.done{border-color:var(--green)}
.cat-name{font-size:14px;font-weight:600}
.cat-progress{font-size:12px;color:var(--muted)}
.cat-progress.done{color:var(--green)}
.back-bar{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.back-btn{background:var(--surface);border:none;border-radius:8px;padding:7px 12px;color:var(--muted);font-size:13px;cursor:pointer}
.breadcrumb{flex:1;text-align:center}
.breadcrumb .cat-label{font-size:10px;color:var(--muted);text-transform:uppercase}
.breadcrumb .pos-label{font-size:13px;font-weight:700}
.progress-pct{font-size:11px;color:var(--muted)}
.progress-bar{background:var(--surface);border-radius:4px;height:4px;margin-bottom:16px}
.progress-fill{background:var(--accent);border-radius:4px;height:4px;transition:width .3s}
.producto-nombre{font-size:26px;font-weight:800;text-align:center;margin-bottom:6px}
.sistema-label{font-size:12px;color:var(--muted);text-align:center;margin-bottom:16px}
.sistema-val{color:var(--accent2);font-weight:700}
.casilleros{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.casillero{background:var(--surface);border-radius:10px;padding:10px;text-align:center}
.casillero .col-label{font-size:9px;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
.casillero input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 4px;font-size:18px;font-weight:700;text-align:center;color:var(--text);outline:none}
.casillero input:focus{border-color:var(--accent)}
.casillero .eval-preview{font-size:10px;color:var(--green);margin-top:4px;min-height:14px}
.casillero.total-box input{background:#14532d;border-color:var(--green);color:var(--green);font-weight:800}
.casillero.total-box .col-label{color:var(--green);font-weight:700}
.dif-label{font-size:11px;margin-top:3px}
.nav-btns{display:flex;gap:8px}
.btn-prev{flex:1;background:var(--surface);border:none;border-radius:12px;padding:13px;font-size:13px;color:var(--muted);cursor:pointer}
.btn-next{flex:2;background:var(--accent);border:none;border-radius:12px;padding:13px;font-size:15px;font-weight:700;color:white;cursor:pointer}
.btn-next.finish{background:var(--green);color:#1a1a1a}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:white;padding:10px 20px;border-radius:10px;font-size:14px;display:none;z-index:100}
#toast.show{display:block}
#toast.success{background:#16a34a}
#toast.error{background:#dc2626}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- INICIO -->
<div id="screen-inicio" class="screen active">
  <div style="text-align:center;margin:20px 0 16px">
    <h1>📋 CONTEO DE STOCK</h1>
    <p class="subtitle">Central Recoleta 4</p>
  </div>
  <div class="card">
    <div style="margin-bottom:8px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase">Datos del conteo</div>
    <div class="grid2" style="margin-bottom:10px">
      <div><div class="label">Fecha</div><input type="date" id="inp-fecha"></div>
      <div><div class="label">Hora</div><input type="time" id="inp-hora"></div>
    </div>
    <div class="grid2">
      <div>
        <div class="label">Turno</div>
        <div class="turno-toggle">
          <div class="turno-btn active" data-turno="M" onclick="setTurno('M')">M</div>
          <div class="turno-btn" data-turno="T" onclick="setTurno('T')">T</div>
        </div>
      </div>
      <div><div class="label">Responsable</div><input type="text" id="inp-responsable" placeholder="Nombre"></div>
    </div>
  </div>
  <button class="btn btn-info" id="btn-datalive" onclick="cargarDatalive()">⬇️ Cargar stock desde Datalive</button>
  <div class="card">
    <div style="margin-bottom:10px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase">Progreso</div>
    <div class="cat-list" id="cat-list"></div>
  </div>
  <button class="btn btn-disabled" id="btn-enviar" onclick="enviarConteo()">📧 Enviar conteo</button>
  <div style="text-align:center;margin-top:8px">
    <span style="font-size:12px;color:var(--muted);cursor:pointer;text-decoration:underline" onclick="nuevoConteo()">Nuevo conteo</span>
  </div>
</div>

<!-- PRODUCTO -->
<div id="screen-producto" class="screen">
  <div class="back-bar">
    <button class="back-btn" onclick="volverInicio()">← Volver</button>
    <div class="breadcrumb">
      <div class="cat-label" id="prod-cat-label"></div>
      <div class="pos-label" id="prod-pos-label"></div>
    </div>
    <div class="progress-pct" id="prod-pct"></div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="prod-progress-fill"></div></div>
  <div class="producto-nombre" id="prod-nombre"></div>
  <div class="sistema-label">SISTEMA: <span class="sistema-val" id="prod-sistema">—</span></div>
  <div class="casilleros" id="casilleros-grid"></div>
  <div class="nav-btns">
    <button class="btn-prev" onclick="navProd(-1)">← Ant.</button>
    <button class="btn-next" id="btn-next" onclick="navProd(1)">Siguiente →</button>
  </div>
</div>

<div id="toast"></div>

<script>
const CATEGORIAS = __CATEGORIAS_JSON__;

let state = { fecha:"", hora:"", turno:"M", responsable:"", sistemaStock:{}, conteo:{} };
let curCatIdx = 0, curProdIdx = 0;

window.addEventListener("DOMContentLoaded", () => {
  const saved = localStorage.getItem("conteo-stock");
  if (saved) { try { state = JSON.parse(saved); } catch(e){} }
  const now = new Date();
  if (!state.fecha) state.fecha = now.toISOString().slice(0,10);
  if (!state.hora)  state.hora  = now.toTimeString().slice(0,5);
  document.getElementById("inp-fecha").value       = state.fecha;
  document.getElementById("inp-hora").value        = state.hora;
  document.getElementById("inp-responsable").value = state.responsable || "";
  setTurno(state.turno || "M");
  renderCatList();
  actualizarBotonEnviar();
});

document.getElementById("inp-fecha").addEventListener("input", e => { state.fecha = e.target.value; save(); });
document.getElementById("inp-hora").addEventListener("input",  e => { state.hora  = e.target.value; save(); });
document.getElementById("inp-responsable").addEventListener("input", e => { state.responsable = e.target.value; save(); });

function setTurno(t) {
  state.turno = t;
  document.querySelectorAll(".turno-btn").forEach(b => b.classList.toggle("active", b.dataset.turno === t));
  save();
}
function save() { localStorage.setItem("conteo-stock", JSON.stringify(state)); }

function renderCatList() {
  const list = document.getElementById("cat-list");
  list.innerHTML = "";
  CATEGORIAS.forEach((cat, ci) => {
    const done  = cat.productos.filter(p => state.conteo[p] && state.conteo[p].__done).length;
    const total = cat.productos.length;
    const isDone = done === total;
    const item = document.createElement("div");
    item.className = "cat-item" + (isDone ? " done" : "");
    item.innerHTML = `<span class="cat-name">${isDone?"🟢":"⚪"} ${cat.nombre}</span>
                      <span class="cat-progress ${isDone?"done":""}">${done}/${total}${isDone?" ✓":""}</span>`;
    item.onclick = () => abrirCategoria(ci);
    list.appendChild(item);
  });
}

function actualizarBotonEnviar() {
  const total = CATEGORIAS.reduce((s,c) => s + c.productos.length, 0);
  const done  = CATEGORIAS.reduce((s,c) => s + c.productos.filter(p => state.conteo[p]&&state.conteo[p].__done).length, 0);
  const btn = document.getElementById("btn-enviar");
  if (done === total) { btn.className = "btn btn-success"; btn.textContent = "📧 Enviar conteo"; }
  else { btn.className = "btn btn-disabled"; btn.textContent = `📧 Enviar (${done}/${total})`; }
}

async function cargarDatalive() {
  const btn = document.getElementById("btn-datalive");
  btn.innerHTML = '<span class="spinner"></span>Cargando...'; btn.disabled = true;
  try {
    const res = await fetch("/api/stock");
    if (!res.ok) throw new Error(await res.text());
    state.sistemaStock = await res.json(); save();
    showToast("✅ Stock cargado desde Datalive", "success");
    if (document.getElementById("screen-producto").classList.contains("active")) renderProd();
  } catch(e) { showToast("❌ Error Datalive: " + e.message, "error"); }
  finally { btn.innerHTML = "⬇️ Cargar stock desde Datalive"; btn.disabled = false; }
}

function abrirCategoria(ci) { curCatIdx = ci; curProdIdx = 0; mostrarPantallaProducto(); }

function mostrarPantallaProducto() {
  document.getElementById("screen-inicio").classList.remove("active");
  document.getElementById("screen-producto").classList.add("active");
  renderProd();
}

function volverInicio() {
  document.getElementById("screen-producto").classList.remove("active");
  document.getElementById("screen-inicio").classList.add("active");
  renderCatList(); actualizarBotonEnviar();
}

function navProd(dir) {
  guardarCasilleros();
  const cat = CATEGORIAS[curCatIdx];
  const next = curProdIdx + dir;
  if (next < 0) {
    if (curCatIdx > 0) { curCatIdx--; curProdIdx = CATEGORIAS[curCatIdx].productos.length - 1; renderProd(); }
    else volverInicio();
    return;
  }
  if (next >= cat.productos.length) {
    if (curCatIdx < CATEGORIAS.length - 1) { curCatIdx++; curProdIdx = 0; renderProd(); }
    else volverInicio();
    return;
  }
  curProdIdx = next; renderProd();
}

function renderProd() {
  const cat  = CATEGORIAS[curCatIdx];
  const prod = cat.productos[curProdIdx];
  const pct  = Math.round(((curProdIdx+1) / cat.productos.length) * 100);
  document.getElementById("prod-cat-label").textContent = cat.nombre;
  document.getElementById("prod-pos-label").textContent = `${curProdIdx+1} de ${cat.productos.length}`;
  document.getElementById("prod-pct").textContent = pct + "%";
  document.getElementById("prod-progress-fill").style.width = pct + "%";
  document.getElementById("prod-nombre").textContent = prod;
  const sys = state.sistemaStock[normalizeKey(prod)] ?? "—";
  document.getElementById("prod-sistema").textContent = sys;
  renderCasilleros(prod, columnasParaTipo(cat.tipo), sys);
  const isLast = curProdIdx === cat.productos.length-1 && curCatIdx === CATEGORIAS.length-1;
  const btn = document.getElementById("btn-next");
  btn.textContent = isLast ? "Finalizar ✓" : "Siguiente →";
  btn.className = "btn-next" + (isLast ? " finish" : "");
}

function columnasParaTipo(tipo) {
  if (tipo==="bebida") return ["exhibidora","bajo_mostrador","deposito"];
  if (tipo==="simple") return ["cantidad"];
  return ["batea","horno","exhibidora","freezer"];
}

function renderCasilleros(prod, columnas, sys) {
  const grid   = document.getElementById("casilleros-grid");
  const saved  = state.conteo[prod] || {};
  grid.innerHTML = "";
  columnas.forEach(col => {
    const val = saved[col] ?? "";
    const div = document.createElement("div");
    div.className = "casillero";
    div.innerHTML = `<div class="col-label">${col.replace("_"," ")}</div>
      <input type="text" inputmode="decimal" data-col="${col}" value="${val}" placeholder="—">
      <div class="eval-preview" data-col-preview="${col}"></div>`;
    grid.appendChild(div);
  });
  const totalDiv = document.createElement("div");
  totalDiv.className = "casillero total-box"; totalDiv.id = "casillero-total";
  totalDiv.innerHTML = `<div class="col-label">Total</div>
    <input type="text" readonly id="inp-total" value="${saved.total??''}">
    <div class="dif-label" id="dif-label"></div>`;
  grid.appendChild(totalDiv);
  grid.querySelectorAll("input[data-col]").forEach(inp => {
    inp.addEventListener("input", () => actualizarPreview(inp));
    inp.addEventListener("blur",  () => evaluarCampo(inp, prod, columnas, sys));
    inp.addEventListener("focus", e => e.target.select());
  });
  recalcularTotal(columnas, sys, saved);
}

function actualizarPreview(inp) {
  const prev = document.querySelector(`[data-col-preview="${inp.dataset.col}"]`);
  if (!prev) return;
  const r = safeEval(inp.value.trim());
  prev.textContent = (r !== null && /[+\-*\/]/.test(inp.value)) ? "= " + r : "";
}

function evaluarCampo(inp, prod, columnas, sys) {
  const r = safeEval(inp.value.trim());
  if (r !== null) inp.value = r;
  actualizarPreview(inp);
  recalcularTotal(columnas, sys, {});
}

function recalcularTotal(columnas, sys, saved) {
  let suma = 0;
  columnas.forEach(col => {
    const inp = document.querySelector(`input[data-col="${col}"]`);
    if (inp) { const v = parseFloat(inp.value); if (!isNaN(v)) suma += v; }
  });
  const inpTotal = document.getElementById("inp-total");
  const difLabel = document.getElementById("dif-label");
  if (inpTotal) inpTotal.value = suma;
  if (difLabel) {
    const s = parseInt(sys);
    if (!isNaN(s)) {
      const dif = suma - s;
      difLabel.textContent = dif===0 ? "DIF: 0" : (dif>0 ? `DIF: +${dif}` : `DIF: ${dif}`);
      difLabel.style.color = dif===0 ? "var(--green)" : "var(--red)";
    } else { difLabel.textContent = ""; }
  }
}

function guardarCasilleros() {
  const prod = CATEGORIAS[curCatIdx].productos[curProdIdx];
  const cat  = CATEGORIAS[curCatIdx];
  const cols = columnasParaTipo(cat.tipo);
  const data = { __done: true };
  cols.forEach(col => {
    const inp = document.querySelector(`input[data-col="${col}"]`);
    data[col] = inp ? (parseFloat(inp.value) || 0) : 0;
  });
  const inpT = document.getElementById("inp-total");
  data.total   = inpT ? (parseFloat(inpT.value) || 0) : 0;
  data.sistema = state.sistemaStock[normalizeKey(prod)] ?? null;
  data.dif     = data.sistema !== null ? data.total - data.sistema : null;
  if (!state.conteo[prod]) state.conteo[prod] = {};
  Object.assign(state.conteo[prod], data);
  save();
}

async function enviarConteo() {
  const btn = document.getElementById("btn-enviar");
  if (btn.classList.contains("btn-disabled")) return;
  btn.innerHTML = '<span class="spinner"></span>Enviando...'; btn.disabled = true;
  try {
    const res = await fetch("/api/enviar", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        fecha: document.getElementById("inp-fecha").value,
        hora:  document.getElementById("inp-hora").value,
        turno: state.turno,
        responsable: document.getElementById("inp-responsable").value,
        conteo: state.conteo,
      }),
    });
    if (!res.ok) throw new Error(await res.text());
    showToast("✅ Conteo enviado por email", "success");
  } catch(e) { showToast("❌ Error al enviar: " + e.message, "error"); }
  finally { btn.innerHTML = "📧 Enviar conteo"; btn.disabled = false; }
}

function nuevoConteo() {
  if (!confirm("¿Limpiar el conteo actual y empezar de cero?")) return;
  const now = new Date();
  state = { fecha:now.toISOString().slice(0,10), hora:now.toTimeString().slice(0,5),
            turno:"M", responsable:"", sistemaStock:{}, conteo:{} };
  save(); location.reload();
}

function safeEval(expr) {
  if (!expr) return null;
  if (!/^[\d\s\+\-\*\/\.]+$/.test(expr)) return null;
  try {
    const r = Function('"use strict";return('+expr+')')();
    if (typeof r==="number" && isFinite(r)) return Math.round(r*100)/100;
  } catch(e){}
  return null;
}

function normalizeKey(s) {
  return s.toLowerCase()
    .normalize("NFD").replace(/[̀-ͯ]/g,"")
    .replace(/[^a-z0-9 ]/g," ").replace(/\s+/g," ").trim();
}

function showToast(msg, type) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.className = "show " + (type||"");
  setTimeout(() => t.className = "", 3500);
}
</script>
</body>
</html>
